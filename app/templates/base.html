<!doctype html>
<html lang="es" x-data="theme" :class="dark ? 'dark' : ''">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Apuestas EC{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','ui-sans-serif','system-ui']},colors:{brand:{600:'#16a34a'},night:{900:'#0f172a',800:'#1e293b'}}}}}</script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="min-h-screen bg-gray-50 font-sans text-gray-900 antialiased dark:bg-slate-900 dark:text-slate-100">
<script>document.addEventListener('alpine:init',()=>{Alpine.data('theme',()=>({dark:localStorage.theme==='dark'||(!('theme' in localStorage)&&matchMedia('(prefers-color-scheme: dark)').matches),toggle(){this.dark=!this.dark;localStorage.theme=this.dark?'dark':'light'}}))})</script>
<header class="sticky top-0 z-30 border-b border-gray-200/80 bg-white/90 backdrop-blur dark:border-slate-700 dark:bg-slate-900/90">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8">
    <a href="/" class="flex items-center gap-3 font-extrabold tracking-tight">
      <span class="grid h-10 w-10 place-items-center rounded-xl bg-emerald-600 text-white shadow-sm">EC</span>
      <span>Apuestas EC</span>
    </a>
    <nav class="flex items-center gap-2 text-sm font-medium">
      <a class="rounded-lg px-3 py-2 hover:bg-gray-100 dark:hover:bg-slate-800" href="/">Cuotas</a>
      <a class="rounded-lg px-3 py-2 hover:bg-gray-100 dark:hover:bg-slate-800" href="/admin">Admin</a>
      <button @click="toggle" class="grid h-10 w-10 place-items-center rounded-lg border border-gray-200 bg-white hover:bg-gray-100 dark:border-slate-700 dark:bg-slate-800 dark:hover:bg-slate-700" aria-label="Cambiar tema">
        <svg x-show="!dark" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m8.66-13.66-.7.7M4.04 19.96l-.7.7M21 12h-1M4 12H3m16.96 7.96-.7-.7M4.04 4.04l-.7-.7M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
        <svg x-show="dark" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.35 15.35A9 9 0 118.65 3.65 7 7 0 0020.35 15.35z"/></svg>
      </button>
    </nav>
  </div>
</header>
<main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">{% block content %}{% endblock %}</main>
<footer class="border-t border-gray-200 py-6 text-sm text-gray-600 dark:border-slate-700 dark:text-slate-300">
  <div class="mx-auto flex max-w-7xl flex-col gap-2 px-4 sm:flex-row sm:items-center sm:justify-between sm:px-6 lg:px-8">
    <p>Apostar puede ser adictivo. Juega con responsabilidad. +18.</p>
    <div class="flex gap-4"><a href="/" class="hover:text-emerald-600">About</a><a href="/healthz" class="hover:text-emerald-600">Health</a></div>
  </div>
</footer>
</body>
</html>
