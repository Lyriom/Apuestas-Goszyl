<!doctype html>
<html lang="es" x-data="{ dark: localStorage.theme === 'dark' || (!('theme' in localStorage) && matchMedia('(prefers-color-scheme: dark)').matches) }" :class="dark ? 'dark' : ''">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ app_description if app_description else 'Comparador de cuotas LigaPro Ecuador y la Tri.' }}">
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
          colors: {
            brand: { 50:'#ecfdf5', 100:'#d1fae5', 200:'#a7f3d0', 300:'#6ee7b7', 400:'#34d399', 500:'#10b981', 600:'#059669', 700:'#047857', 800:'#065f46', 900:'#064e3b' },
            ink:   { 900:'#0b1220', 800:'#111a2e', 700:'#1a2540', 600:'#243155' },
          },
          boxShadow: {
            soft: '0 1px 2px rgba(15,23,42,0.06), 0 4px 16px rgba(15,23,42,0.06)',
            ring: '0 0 0 1px rgba(16,185,129,0.35), 0 8px 32px rgba(16,185,129,0.18)',
          },
        },
      },
    }
  </script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    .gradient-bg {
      background: radial-gradient(1200px 600px at 10% -20%, rgba(16,185,129,0.18), transparent 60%),
                  radial-gradient(900px 500px at 100% 0%, rgba(56,189,248,0.10), transparent 55%),
                  linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    }
    .dark .gradient-bg {
      background: radial-gradient(1200px 600px at 10% -20%, rgba(16,185,129,0.18), transparent 60%),
                  radial-gradient(900px 500px at 100% 0%, rgba(56,189,248,0.10), transparent 55%),
                  linear-gradient(180deg, #0b1220 0%, #0a0f1d 100%);
    }
    .glass { backdrop-filter: blur(10px); }
    .scrollbar-thin::-webkit-scrollbar { height: 6px; width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.4); border-radius: 9999px; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-900 antialiased dark:bg-ink-900 dark:text-slate-100">
<div class="gradient-bg min-h-screen">
  <header class="sticky top-0 z-30 border-b border-slate-200/70 bg-white/70 glass dark:border-slate-700/60 dark:bg-ink-900/70">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8">
      <a href="/" class="flex items-center gap-3 font-extrabold tracking-tight">
        <span class="grid h-10 w-10 place-items-center rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 text-white shadow-soft">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l3 3 4-7 4 11 3-7h4"/></svg>
        </span>
        <span class="text-lg">{{ app_name }}</span>
        <span class="hidden rounded-md bg-brand-100 px-2 py-0.5 text-[10px] font-bold uppercase tracking-wider text-brand-700 dark:bg-brand-900/40 dark:text-brand-300 sm:inline">Ecuador</span>
      </a>
      <nav class="flex items-center gap-1 text-sm font-semibold">
        <a class="rounded-lg px-3 py-2 text-slate-700 transition hover:bg-slate-100 hover:text-slate-900 dark:text-slate-300 dark:hover:bg-ink-700 dark:hover:text-white" href="/">Cuotas</a>
        {% if is_admin %}
          <a class="inline-flex items-center gap-1.5 rounded-lg px-3 py-2 text-slate-700 transition hover:bg-slate-100 hover:text-slate-900 dark:text-slate-300 dark:hover:bg-ink-700 dark:hover:text-white" href="/admin">
            <svg class="h-3.5 w-3.5 text-slate-400 dark:text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 11c0-1.105.895-2 2-2s2 .895 2 2v3a2 2 0 01-2 2 2 2 0 01-2-2v-3zM6 9V7a6 6 0 1112 0v2"/></svg>
            Admin
          </a>
        {% endif %}
        {% if is_authenticated %}
          <a class="rounded-lg px-3 py-2 text-slate-600 transition hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-ink-700" href="/auth/logout">Salir</a>
        {% else %}
          <a class="rounded-lg px-3 py-2 text-slate-600 transition hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-ink-700" href="/auth/login">Acceso staff</a>
        {% endif %}
        <button @click="dark = !dark; localStorage.theme = dark ? 'dark' : 'light'" class="ml-1 grid h-9 w-9 place-items-center rounded-lg border border-slate-200 bg-white text-slate-700 transition hover:bg-slate-100 dark:border-slate-700 dark:bg-ink-800 dark:text-slate-200 dark:hover:bg-ink-700" aria-label="Cambiar tema">
          <svg x-show="!dark" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m8.66-13.66-.7.7M4.04 19.96l-.7.7M21 12h-1M4 12H3m16.96 7.96-.7-.7M4.04 4.04l-.7-.7M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
          <svg x-show="dark" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.35 15.35A9 9 0 118.65 3.65 7 7 0 0020.35 15.35z"/></svg>
        </button>
      </nav>
    </div>
  </header>
  <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">{% block content %}{% endblock %}</main>
  <footer class="border-t border-slate-200/70 py-8 text-sm text-slate-600 dark:border-slate-700/60 dark:text-slate-400">
    <div class="mx-auto flex max-w-7xl flex-col gap-3 px-4 sm:flex-row sm:items-center sm:justify-between sm:px-6 lg:px-8">
      <p class="flex items-center gap-2">
        <span class="inline-flex h-6 w-6 items-center justify-center rounded-full bg-amber-500/15 text-amber-600 dark:text-amber-400">+18</span>
        Apostar puede ser adictivo. Juega con responsabilidad.
      </p>
      <div class="flex gap-4">
        <a href="/" class="hover:text-brand-600">Inicio</a>
        <a href="/healthz" class="hover:text-brand-600">Health</a>
      </div>
    </div>
  </footer>
</div>
</body>
</html>
