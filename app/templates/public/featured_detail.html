{% extends 'base.html' %}
{% block title %}{{ item.title }} · {{ app_name }}{% endblock %}
{% block content %}
<article class="mx-auto max-w-3xl">
  <a href="/" class="inline-flex items-center gap-1 text-sm font-bold text-slate-500 transition hover:text-brand-600 dark:text-slate-400 dark:hover:text-brand-400">
    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    Volver al inicio
  </a>

  <header class="mt-4">
    <h1 class="text-3xl font-black leading-tight tracking-tight sm:text-4xl">{{ item.title }}</h1>
    <p class="mt-3 text-lg text-slate-600 dark:text-slate-300">{{ item.excerpt }}</p>
    <p class="mt-3 text-xs font-semibold uppercase tracking-wide text-slate-400 dark:text-slate-500">Publicado {{ item.received_at.strftime('%d/%m/%Y %H:%M') }}</p>
  </header>

  <div class="prose prose-slate mt-8 max-w-none dark:prose-invert prose-a:text-brand-600 prose-a:font-semibold dark:prose-a:text-brand-400">
    {{ item.content_html | safe }}
  </div>
</article>
{% endblock %}
